<!-- START: ID=HB16-v4.2 Image Background Split -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
  <tr>
    <td bgcolor="{{bgColor}}" style="background:{{bgColor}};">
      <img src="{{imageUrl}}" alt="{{headline}}" width="620" style="display:block; width:100%; height:auto;" class="full-width">
    </td>
  </tr>
  <tr>
    <td bgcolor="{{bgColor}}" align="center" style="padding:34px 36px 40px; color:{{textColor}};">
      <h1 style="margin:0 0 14px; font-size:30px; line-height:34px; font-weight:normal; font-family:'Guardian Egyptian', Georgia, serif; color:{{textColor}};">{{headline}}</h1>
      <p style="margin:0 0 20px; font-size:16px; line-height:24px; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">{{description}}</p>
      <a href="{{ctaUrl}}" target="_blank" style="background:#FFFFFF; color:#00175A; display:inline-block; padding:12px 24px; text-decoration:none; border-radius:3px; font-size:15px; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">{{ctaLabel}}</a>
    </td>
  </tr>
</table>
<!-- END: HB16-v4.2 Image Background Split -->
