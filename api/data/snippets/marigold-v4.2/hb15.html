<!-- START: HB15-v4.2 Full Width Hero -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
  <tr>
    <td>
      <span class="mobile-off"><img src="{{imageDesktopUrl}}" alt="{{headline}}" width="100%" style="display:block; height:auto; color:#333333;"></span>
      <span class="mobile-on" style="display:none;"><img src="{{imageMobileUrl}}" alt="{{headline}}" width="100%" style="display:block; height:auto; color:#333333;"></span>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding:0;">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr><td width="100%" align="center" bgcolor="{{headlineBgColor}}" style="padding:30px 20px; color:#FFFFFF; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:24px; line-height:28px;"><strong>{{headline}}</strong></td></tr>
        <tr><td width="100%" align="center" bgcolor="{{bgColor}}" style="padding:36px 24px 30px; color:#333333; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:18px; line-height:25px;">{{description}}</td></tr>
        <tr><td align="center" bgcolor="{{bgColor}}" style="padding:0 24px 34px;"><a href="{{ctaUrl}}" target="_blank" style="background:#006FCF; color:#FFFFFF; display:inline-block; padding:12px 24px; text-decoration:none; border-radius:3px; font-size:15px; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">{{ctaLabel}}</a></td></tr>
      </table>
    </td>
  </tr>
</table>
<!-- END: HB15-v4.2 Full Width Hero -->
