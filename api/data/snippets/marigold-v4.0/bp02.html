<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#FFFFFF">
  <tr>
    <td style="padding:20px; border-bottom:1px solid #D9D9D6;">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td width="60"><img src="{{logoUrl}}" alt="{{taglineAlt}}" width="60" style="display:block; height:auto;"></td>
          <td style="padding-left:12px;"><img src="{{taglineUrl}}" alt="{{taglineAlt}}" width="150" style="display:block; height:auto;"></td>
          <td align="right" style="font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; color:#3D3D3D; font-size:15px; line-height:22px;">Tu cuenta termina en:<br>{{accountSuffix}}<br>Miembro desde: {{memberSince}}</td>
          <td width="80" align="right" style="padding-left:12px;"><img src="{{cardImageUrl}}" alt="{{cardImageAlt}}" width="80" style="display:block; height:auto;"></td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding:10px 20px 11px; border-bottom:1px solid #D9D9D6;">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td style="font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; color:#3D3D3D; font-size:15px; line-height:22px;">Hola {{greetingName}}</td>
          <td align="right"><a href="{{loginUrl}}" target="_blank" style="border:2px solid #4875CD; color:#4875CD; display:inline-block; padding:10px 12px; text-decoration:none; border-radius:3px; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">{{loginLabel}}</a></td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<!-- END: BP02-v4.0 -->
