<!-- START: BP01 Master - Centurion -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="620" style="width:620px;" class="wrapper">
  <tr>
    <td bgcolor="#000000" style="background:#000000; padding:20px 30px;">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td width="60" valign="middle"><img src="{{logoUrl}}" alt="American Express" width="60" style="display:block; height:auto;"></td>
          <td valign="middle" style="padding-left:15px;"><img src="{{taglineUrl}}" alt="The Centurion Card" width="150" style="display:block; height:auto;"></td>
          <td align="right" valign="middle" style="color:#FFFFFF; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:14px; line-height:20px;">Tu cuenta termina en: {{accountSuffix}}<br>Miembro desde: {{memberSince}}</td>
          <td align="right" valign="middle" width="80" style="padding-left:12px;"><img src="{{cardImageUrl}}" alt="The Centurion Card" width="80" style="display:block; height:auto;"></td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td bgcolor="#111111" style="background:#111111; padding:12px 30px; border-top:1px solid #333333;">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td style="color:#FFFFFF; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:15px; line-height:22px;">Hola {{greetingName}}</td>
          <td align="right"><a href="{{loginUrl}}" target="_blank" style="border:1px solid #FFFFFF; color:#FFFFFF; display:inline-block; font-size:14px; line-height:100%; padding:10px 14px; text-decoration:none; border-radius:2px; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">{{loginLabel}}</a></td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<!-- END: BP01 -->
