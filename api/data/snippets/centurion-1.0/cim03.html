<!-- START: CIM03 Horizontal Pairs Logo Top -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#000000">
  <tr>
    <th width="305" valign="top" style="padding:0 8px 0 0;" bgcolor="#111111">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr><td align="center" style="padding:20px 20px 10px;"><img src="{{left_logo_url}}" alt="{{left_title}}" width="150" style="display:block; height:auto; margin:0 auto;"></td></tr>
        <tr><td align="center"><img src="{{left_image_url}}" alt="{{left_title}}" width="305" style="display:block; width:100%; height:auto;"></td></tr>
        <tr><td align="center" style="padding:20px 18px 8px; color:#FFFFFF; font-family:'Guardian Egyptian', Georgia, serif; font-size:24px; line-height:28px;">{{left_title}}</td></tr>
        <tr><td align="center" style="padding:0 18px 18px; color:#CCCCCC; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:15px; line-height:22px;">{{left_description}}</td></tr>
      </table>
    </th>
    <th width="305" valign="top" style="padding:0 0 0 8px;" bgcolor="#111111">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr><td align="center" style="padding:20px 20px 10px;"><img src="{{right_logo_url}}" alt="{{right_title}}" width="150" style="display:block; height:auto; margin:0 auto;"></td></tr>
        <tr><td align="center"><img src="{{right_image_url}}" alt="{{right_title}}" width="305" style="display:block; width:100%; height:auto;"></td></tr>
        <tr><td align="center" style="padding:20px 18px 8px; color:#FFFFFF; font-family:'Guardian Egyptian', Georgia, serif; font-size:24px; line-height:28px;">{{right_title}}</td></tr>
        <tr><td align="center" style="padding:0 18px 18px; color:#CCCCCC; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:15px; line-height:22px;">{{right_description}}</td></tr>
      </table>
    </th>
  </tr>
</table>
<!-- END: CIM03 Horizontal Pairs Logo Top -->
