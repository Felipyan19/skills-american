<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>{{subject}}</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="AMX_GBS Centurion Pack 1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <style>
      body { margin: 0; padding: 0; background: {{outerBg}}; color: #FFFFFF; font-family: Helvetica Neue, Helvetica, Arial, sans-serif; }
      table { border-collapse: collapse; }
      .wrapper { width: 620px; }
      .full-width { width: 100%; }
      .show-mobile { display: none; }
      .cell-display-mobile { width: 100%; display: block; }
    </style>
  </head>
  <body style="margin:0;background:{{outerBg}}">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin:0 auto;">
      <tr>
        <td align="center">
          <div style="display:none;">
            <custom name="opencounter" type="tracking"/>
          </div>
          <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:{{outerBg}}">
            <tr>
              <td align="center">
                <table role="none" cellpadding="0" cellspacing="0" border="0" width="620" style="width:620px;" class="wrapper">
                  <tr>
                    <td>
                      {{header_html}}
                      {{body_html}}
                      {{footer_html}}
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
