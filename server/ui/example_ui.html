<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Componentes HTML</title>
  <style>
    @media screen {
      @font-face {
        font-family: 'Guardian Egyptian';
        font-style: normal;
        font-weight: 400;
        src: url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/guardianregular.woff2) format('woff2'),
             url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/guardianregular.woff) format('woff');
      }
      @font-face {
        font-family: 'BentonSans400';
        font-style: normal;
        font-weight: 400;
        src: url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/3be50273-0b2e-4aef-ae68-882eacd611f9-3.woff2) format('woff2'),
             url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/3be50273-0b2e-4aef-ae68-882eacd611f9-3.woff) format('woff');
      }
      @font-face {
        font-family: 'BentonSans500';
        font-style: normal;
        font-weight: 500;
        src: url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/0fababca-4914-46dd-9b0f-efbd51f67ae8-3.woff2) format('woff2'),
             url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/0fababca-4914-46dd-9b0f-efbd51f67ae8-3.woff) format('woff');
      }
    }

    :root {
      --bg: #f4f4f4;
      --surface: #ffffff;
      --text: #3d3d3d;
      --heading: #00175a;
      --muted: #53565a;
      --line: #e0e0e0;
      --line-soft: #ededed;
      --accent: #006fcf;
      --success: #157f4f;
      --warning: #9a6b12;
      --danger: #a2464b;
      --shadow: 0 12px 34px rgba(0, 23, 90, 0.05);
      --radius-xl: 16px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "BentonSans400", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .skip-link {
      position: absolute;
      top: -48px;
      left: 16px;
      z-index: 10;
      background: #111;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .skip-link:focus {
      top: 16px;
    }

    .app {
      width: min(900px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 46px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .back:focus-visible,
    summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .hero,
    .section-block,
    details {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 30px 32px 28px;
      margin-bottom: 18px;
      border-top: 4px solid var(--heading);
      background:
        linear-gradient(90deg, rgba(0, 111, 207, 0.02), rgba(0, 23, 90, 0.06) 100%),
        #ffffff;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    h1 {
      margin: 0;
      font-family: "Guardian Egyptian", Georgia, serif;
      font-size: clamp(38px, 7vw, 54px);
      line-height: 0.98;
      letter-spacing: -0.03em;
      font-weight: 400;
      color: var(--heading);
    }

    .lead {
      margin: 18px 0 0;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      font-size: 12px;
      color: var(--muted);
    }

    .pill strong {
      color: var(--heading);
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    .status.exact { color: var(--success); }
    .status.structural { color: var(--warning); }
    .status.approx { color: var(--danger); }

    .layout {
      display: grid;
      gap: 14px;
    }

    .section-block {
      padding: 18px 20px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    .section-note {
      color: var(--muted);
      font-size: 12px;
    }

    .structure-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      padding: 14px;
      background: #ffffff;
    }

    .metric .label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .metric .value {
      font-family: "IBM Plex Mono", monospace;
      color: var(--heading);
      font-size: 12px;
      line-height: 1.6;
      word-break: break-word;
    }

    .token-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .token {
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      padding: 8px 12px;
      background: #ffffff;
      font-family: "IBM Plex Mono", monospace;
      color: var(--heading);
      font-size: 12px;
    }

    details {
      overflow: hidden;
    }

    summary {
      list-style: none;
      padding: 16px 18px;
      cursor: pointer;
      font-size: 13px;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    pre {
      margin: 0;
      padding: 0 18px 18px;
      overflow: auto;
      color: var(--heading);
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 16px, 900px);
        padding-top: 16px;
      }

      .structure-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Ir al contenido</a>
  <div class="app">
    <a class="back" href="/">← Volver al catálogo</a>

    <main id="main-content" tabindex="-1">
      <section class="hero" id="hero">
        <div class="empty">Cargando comunicación...</div>
      </section>

      <div class="layout" id="content" hidden></div>
    </main>
  </div>

  <script>
    const statusMeta = {
      alta: { label: "Exacta", className: "exact" },
      estructural: { label: "Homologada", className: "structural" },
      aproximada: { label: "Pendiente", className: "approx" },
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function statusFor(example) {
      return statusMeta[example.fidelity] || { label: example.fidelity, className: "structural" };
    }

    function renderTokens(items, emptyLabel) {
      if (!items || !items.length) {
        return `<div class="empty">${escapeHtml(emptyLabel)}</div>`;
      }
      return `<div class="token-list">${items.map((item) => `<span class="token">${escapeHtml(item)}</span>`).join("")}</div>`;
    }

    function currentId() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      return parts[1] || "";
    }

    function render(example) {
      const status = statusFor(example);
      const body = Array.isArray(example.payload?.body) ? example.payload.body : [];
      const notes = example.notes || [];
      const substitutions = example.substitutions || [];
      const unsupported = example.unsupportedSourceIds || [];

      document.title = `${example.name} · Componentes HTML`;

      document.getElementById("hero").innerHTML = `
        <p class="eyebrow">American Express</p>
        <h1>${escapeHtml(example.name)}</h1>
        <p class="lead">
          Vista ejecutiva de la pieza para revisar su composición base, la familia HTML utilizada
          y el nivel de cobertura respecto de los componentes de referencia.
        </p>
        <div class="meta-row">
          <span class="pill"><strong>ID</strong> ${escapeHtml(example.id)}</span>
          <span class="pill"><strong>Segmento</strong> ${escapeHtml(example.group)}</span>
          <span class="pill"><strong>Familia</strong> ${escapeHtml(example.templateFamily)}</span>
          <span class="pill"><strong>Cobertura</strong> <span class="status ${status.className}">${escapeHtml(status.label)}</span></span>
        </div>
      `;

      document.getElementById("content").hidden = false;
      document.getElementById("content").innerHTML = `
        <section class="section-block">
          <div class="section-head">
            <h2>Arquitectura base</h2>
            <span class="section-note">${escapeHtml(example.relativePath)}</span>
          </div>
          <div class="structure-grid">
            <div class="metric">
              <span class="label">Encabezado</span>
              <div class="value">${escapeHtml(example.payload?.header || "-")}</div>
            </div>
            <div class="metric">
              <span class="label">Cuerpo</span>
              <div class="value">${escapeHtml(String(body.length))} bloques</div>
            </div>
            <div class="metric">
              <span class="label">Cierre</span>
              <div class="value">${escapeHtml(example.payload?.footer || "-")}</div>
            </div>
          </div>
        </section>

        <section class="section-block">
          <div class="section-head"><h2>Secuencia del cuerpo</h2></div>
          ${renderTokens(body, "Sin bloques en el cuerpo")}
        </section>

        <section class="section-block">
          <div class="section-head"><h2>Matriz de referencia</h2></div>
          ${renderTokens(example.referenceSourceIds, "Sin secuencia de referencia")}
        </section>

        ${notes.length ? `
          <section class="section-block">
            <div class="section-head"><h2>Observaciones de implementación</h2></div>
            ${renderTokens(notes, "")}
          </section>
        ` : ""}

        ${substitutions.length ? `
          <section class="section-block">
            <div class="section-head"><h2>Sustituciones aplicadas</h2></div>
            ${renderTokens(substitutions, "")}
          </section>
        ` : ""}

        ${unsupported.length ? `
          <section class="section-block">
            <div class="section-head"><h2>Componentes pendientes</h2></div>
            ${renderTokens(unsupported, "")}
          </section>
        ` : ""}

        <details>
          <summary>Ver payload</summary>
          <pre>${escapeHtml(JSON.stringify(example.payload, null, 2))}</pre>
        </details>
      `;
    }

    async function init() {
      const id = currentId();
      const response = await fetch(`/api/module1/examples/${encodeURIComponent(id)}`);
      if (!response.ok) {
        throw new Error("No se encontró la comunicación.");
      }
      const payload = await response.json();
      render(payload.example);
    }

    init().catch((error) => {
      document.getElementById("hero").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
