<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Componentes HTML</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2300175a'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23ffffff' text-anchor='middle'%3EA%3C/text%3E%3C/svg%3E">
  <style>
    @media screen {
      @font-face {
        font-family: 'Guardian Egyptian';
        font-style: normal;
        font-weight: 400;
        src: url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/guardianregular.woff2) format('woff2'),
             url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/guardianregular.woff) format('woff');
      }
      @font-face {
        font-family: 'BentonSans400';
        font-style: normal;
        font-weight: 400;
        src: url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/3be50273-0b2e-4aef-ae68-882eacd611f9-3.woff2) format('woff2'),
             url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/3be50273-0b2e-4aef-ae68-882eacd611f9-3.woff) format('woff');
      }
      @font-face {
        font-family: 'BentonSans500';
        font-style: normal;
        font-weight: 500;
        src: url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/0fababca-4914-46dd-9b0f-efbd51f67ae8-3.woff2) format('woff2'),
             url(https://www.aexp-static.com/cdaas/one/statics/@americanexpress/dls-fonts/1.1.0/package/dist/fonts/0fababca-4914-46dd-9b0f-efbd51f67ae8-3.woff) format('woff');
      }
    }

    :root {
      --bg: #f4f4f4;
      --surface: #ffffff;
      --text: #3d3d3d;
      --heading: #00175a;
      --muted: #53565a;
      --line: #e0e0e0;
      --line-soft: #ededed;
      --accent: #006fcf;
      --success: #157f4f;
      --warning: #9a6b12;
      --danger: #a2464b;
      --shadow: 0 12px 34px rgba(0, 23, 90, 0.05);
      --radius-xl: 16px;
      --radius-lg: 12px;
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "BentonSans400", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .skip-link {
      position: absolute;
      top: -48px;
      left: 16px;
      z-index: 10;
      background: #111;
      color: #fff;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
    }

    .skip-link:focus {
      top: 16px;
    }

    .app {
      width: min(900px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 46px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .back:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .hero,
    .section-block {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 30px 32px 28px;
      margin-bottom: 18px;
      border-top: 4px solid var(--heading);
      background:
        linear-gradient(90deg, rgba(0, 111, 207, 0.02), rgba(0, 23, 90, 0.06) 100%),
        #ffffff;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    h1 {
      margin: 0;
      font-family: "Guardian Egyptian", Georgia, serif;
      font-size: clamp(38px, 7vw, 54px);
      line-height: 0.98;
      letter-spacing: -0.03em;
      font-weight: 400;
      color: var(--heading);
    }

    .lead {
      margin: 18px 0 0;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      font-size: 12px;
      color: var(--muted);
    }

    .pill strong {
      color: var(--heading);
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    .status.dynamic { color: var(--accent); }
    .status.exact { color: var(--success); }
    .status.pending { color: var(--danger); }

    .layout {
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .section-block {
      padding: 18px 20px;
      min-width: 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    pre {
      margin: 0;
      padding: 0 18px 18px;
      overflow: auto;
      color: var(--heading);
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .markdown-content {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: #fbfcfe;
      padding: 18px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
      min-width: 0;
      overflow-x: hidden;
    }

    .markdown-content h1,
    .markdown-content h2,
    .markdown-content h3 {
      margin: 0 0 16px;
      color: var(--heading);
      font-family: "Guardian Egyptian", Georgia, serif;
      font-weight: 400;
    }

    .markdown-content h1 {
      font-size: 30px;
      line-height: 1.12;
    }

    .markdown-content h2 {
      font-size: 24px;
      line-height: 1.14;
      margin-top: 22px;
    }

    .markdown-content h3 {
      font-size: 20px;
      line-height: 1.16;
      margin-top: 18px;
    }

    .markdown-content ul {
      margin: 0 0 18px;
      padding-left: 20px;
    }

    .markdown-content li {
      margin: 7px 0;
    }

    .markdown-content p {
      margin: 0 0 14px;
    }

    .markdown-table-wrap {
      width: 100%;
      margin: 0 0 16px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #ffffff;
    }

    .markdown-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .markdown-table th,
    .markdown-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line-soft);
      text-align: left;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
    }

    .markdown-table th {
      color: var(--heading);
      background: #f8fbff;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    .markdown-table tr:last-child td {
      border-bottom: 0;
    }

    .markdown-content code {
      border: 1px solid #d8e3f4;
      border-radius: 6px;
      background: #f2f7ff;
      color: var(--heading);
      padding: 2px 6px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .markdown-code {
      margin: 16px 0 0;
      padding: 16px;
      border: 1px solid #d8e3f4;
      border-radius: var(--radius-lg);
      background: #0f172a;
      color: #e6edf8;
      overflow: hidden;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      line-height: 1.65;
      max-width: 100%;
      min-width: 0;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: normal;
    }

    .markdown-code code {
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: inherit;
      display: block;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: normal;
    }

    .empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
    }

    /* ── Visual preview ─────────────────────────────────── */
    .preview-block {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
    }

    .preview-header h2 {
      margin: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 500;
    }

    .preview-toggle {
      background: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      font-family: "BentonSans500", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .preview-toggle:hover {
      background: #f0f6ff;
    }

    .preview-iframe-wrap {
      background: #e8e8e8;
      display: flex;
      justify-content: center;
      padding: 20px;
      transition: height 0.2s;
    }

    .preview-iframe-wrap iframe {
      border: none;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      width: 640px;
      max-width: 100%;
      height: 560px;
      background: #fff;
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 16px, 900px);
        padding-top: 16px;
      }

      .preview-iframe-wrap iframe {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Ir al contenido</a>
  <div class="app">
    <a class="back" href="/">← Volver al catálogo</a>

    <main id="main-content" tabindex="-1">
      <section class="hero" id="hero">
        <div class="empty">Cargando comunicación...</div>
      </section>

      <div class="layout" id="content" hidden></div>
    </main>
  </div>

  <script>
    const statusMeta = {
      dinamico: { label: "Dinámico", className: "dynamic" },
      exacto: { label: "Exacto", className: "exact" },
      pendiente: { label: "Pendiente", className: "pending" },
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function statusFor(example) {
      const key = example.dashboardStatus || "pendiente";
      return statusMeta[key] || { label: key, className: "pending" };
    }

    function currentId() {
      const parts = window.location.pathname.split("/").filter(Boolean);
      return parts[1] || "";
    }

    function render(example, id) {
      const status = statusFor(example);

      document.title = `${example.name} · Componentes HTML`;

      document.getElementById("hero").innerHTML = `
        <p class="eyebrow">American Express</p>
        <h1>${escapeHtml(example.name)}</h1>
        <p class="lead">
          Vista ejecutiva de la pieza para revisar su composición base, la familia HTML utilizada
          y el nivel de cobertura respecto de los componentes de referencia.
        </p>
        <div class="meta-row">
          <span class="pill"><strong>ID</strong> ${escapeHtml(example.id)}</span>
          <span class="pill"><strong>Segmento</strong> ${escapeHtml(example.group)}</span>
          <span class="pill"><strong>Familia</strong> ${escapeHtml(example.templateFamily)}</span>
          <span class="pill"><strong>Cobertura</strong> <span class="status ${status.className}">${escapeHtml(status.label)}</span></span>
        </div>
      `;

      document.getElementById("content").hidden = false;
      document.getElementById("content").innerHTML = `
        <section class="section-block">
          <div class="section-head"><h2>Markdown del componente</h2></div>
          <div class="markdown-content" id="markdown-content">Cargando Markdown...</div>
        </section>
      `;

      loadVisualPreview(id);
      loadMarkdown(id);
    }

    async function loadMarkdown(id) {
      const node = document.getElementById("markdown-content");
      if (!node) return;

      try {
        const response = await fetch(`/api/module1/examples/${encodeURIComponent(id)}/markdown`);
        if (!response.ok) throw new Error("No se pudo cargar el Markdown.");
        const payload = await response.json();
        node.innerHTML = renderMarkdown(payload.markdown || "Sin Markdown disponible.");
      } catch (error) {
        node.textContent = error.message;
      }
    }

    function renderInlineMarkdown(value) {
      return escapeHtml(value).replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function renderMarkdown(markdown) {
      const lines = String(markdown).split(/\r?\n/);
      const html = [];
      const codeLines = [];
      let inCode = false;
      let codeLanguage = "";
      let inList = false;

      function closeList() {
        if (inList) {
          html.push("</ul>");
          inList = false;
        }
      }

      function normalizeCodeBlock(rawCode, language) {
        const normalizedLanguage = (language || "").trim().toLowerCase();
        const source = rawCode.trim();
        if (normalizedLanguage === "json" || (!normalizedLanguage && (source.startsWith("{") || source.startsWith("[")))) {
          try {
            const parsed = JSON.parse(source);
            return JSON.stringify(parsed, null, 2);
          } catch (_error) {
            return rawCode;
          }
        }
        return rawCode;
      }

      function closeCode() {
        const raw = codeLines.join("\n");
        const normalized = normalizeCodeBlock(raw, codeLanguage);
        html.push(`<pre class="markdown-code"><code>${escapeHtml(normalized)}</code></pre>`);
        codeLines.length = 0;
        codeLanguage = "";
        inCode = false;
      }

      function parseTableCells(line) {
        return line
          .trim()
          .replace(/^\|/, "")
          .replace(/\|$/, "")
          .split("|")
          .map((cell) => cell.trim());
      }

      function isTableSeparatorLine(line) {
        const cells = parseTableCells(line);
        if (!cells.length) {
          return false;
        }
        return cells.every((cell) => /^:?-{3,}:?$/.test(cell.replace(/\s+/g, "")));
      }

      function isTableRowLine(line) {
        return line.includes("|");
      }

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index];
        const fence = line.match(/^```(\w+)?\s*$/);
        if (fence) {
          if (inCode) {
            closeCode();
          } else {
            closeList();
            inCode = true;
            codeLanguage = fence[1] || "";
          }
          continue;
        }

        if (inCode) {
          codeLines.push(line);
          continue;
        }

        if (!line.trim()) {
          closeList();
          continue;
        }

        const nextLine = lines[index + 1] || "";
        if (isTableRowLine(line) && isTableSeparatorLine(nextLine)) {
          closeList();
          const headerCells = parseTableCells(line);
          const bodyRows = [];
          index += 2;
          while (index < lines.length && lines[index].trim() && isTableRowLine(lines[index])) {
            bodyRows.push(parseTableCells(lines[index]));
            index += 1;
          }
          index -= 1;

          const thead = `<thead><tr>${headerCells.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join("")}</tr></thead>`;
          const tbody = bodyRows.length
            ? `<tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>`).join("")}</tbody>`
            : "";
          html.push(`<div class="markdown-table-wrap"><table class="markdown-table">${thead}${tbody}</table></div>`);
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          closeList();
          const level = Math.min(3, heading[1].length);
          html.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        const listItem = line.match(/^-\s+(.+)$/);
        if (listItem) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push(`<li>${renderInlineMarkdown(listItem[1])}</li>`);
          continue;
        }

        closeList();
        html.push(`<p>${renderInlineMarkdown(line)}</p>`);
      }

      closeList();
      if (inCode) closeCode();
      return html.join("");
    }

    /* ── Visual preview ──────────────────────────────────── */

    function setIframeHtml(iframe, html) {
      iframe.srcdoc = html;
      /* auto-resize once loaded */
      iframe.addEventListener("load", () => {
        try {
          const h = iframe.contentDocument.documentElement.scrollHeight;
          if (h > 60) iframe.style.height = Math.min(h + 4, 900) + "px";
        } catch (_) {}
      }, { once: true });
    }

    async function loadVisualPreview(id) {
      const content = document.getElementById("content");

      /* ── Full email preview ── */
      const previewBlock = document.createElement("section");
      previewBlock.className = "preview-block";
      previewBlock.innerHTML = `
        <div class="preview-header">
          <h2>Vista previa del email</h2>
          <button class="preview-toggle" id="toggle-preview" aria-expanded="false" aria-controls="preview-wrap">Ver email</button>
        </div>
        <div class="preview-iframe-wrap" id="preview-wrap" hidden>
          <iframe id="preview-iframe" title="Vista previa del email completo" loading="lazy"></iframe>
        </div>
      `;
      content.prepend(previewBlock);

      document.getElementById("toggle-preview").addEventListener("click", function () {
        const wrap = document.getElementById("preview-wrap");
        const hidden = wrap.hidden;
        wrap.hidden = !hidden;
        this.setAttribute("aria-expanded", String(hidden));
        this.textContent = hidden ? "Ocultar" : "Ver email";
      });

      /* Try the reference HTML first, then compose */
      const refRes = await fetch(`/api/module1/examples/${encodeURIComponent(id)}/html`);
      if (refRes.ok) {
        const data = await refRes.json();
        if (data.html) {
          setIframeHtml(document.getElementById("preview-iframe"), data.html);
        }
      }
    }

    async function init() {
      const id = currentId();
      const response = await fetch(`/api/module1/examples/${encodeURIComponent(id)}`);
      if (!response.ok) {
        throw new Error("No se encontró la comunicación.");
      }
      const payload = await response.json();
      render(payload.example, id);
    }

    init().catch((error) => {
      document.getElementById("hero").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
