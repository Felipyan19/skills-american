<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#FFFFFF">
  <tr>
    <td width="240"><img src="{{imageUrl}}" alt="{{headline}}" width="240" style="display:block; width:100%; height:auto;"></td>
    <td style="padding:24px 24px 24px 20px;">
      <h2 style="margin:0 0 12px; color:#00175A; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:24px; line-height:28px; font-weight:normal;">{{headline}}</h2>
      <p style="margin:0 0 18px; color:#3D3D3D; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:15px; line-height:22px;">{{description}}</p>
      <a href="{{ctaUrl}}" target="_blank" style="background:#4875CD; color:#FFFFFF; display:inline-block; padding:12px 22px; text-decoration:none; border-radius:3px; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">{{ctaLabel}}</a>
    </td>
  </tr>
</table>
