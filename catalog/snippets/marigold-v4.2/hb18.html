<!-- START: HB18-v4.2 Headline Card -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
  <tr>
    <td align="center" bgcolor="{{bg_color}}" background="{{image_url}}" width="620" height="447" valign="bottom" style="background:url({{image_url}}) top left / cover no-repeat {{bg_color}};" class="full-width">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="620" style="width:620px;" class="full-width">
        <tr>
          <td width="20" style="width:20px;">&nbsp;</td>
          <td valign="bottom">
            <table role="none" cellpadding="0" cellspacing="0" border="0" width="425" height="170" style="width:425px; height:170px; background:#FFFFFF;" class="full-width">
              <tr><td colspan="3" height="14" style="height:14px;">&nbsp;</td></tr>
              <tr>
                <td width="20" style="width:20px;">&nbsp;</td>
                <td>
                  <h1 style="font-family:'BentonSans400', HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; margin:0 0 15px 0; font-size:30px; line-height:33px; color:{{text_color}}; font-weight:normal;">{{headline}}</h1>
                  <hr align="left" width="57" height="2" style="border-width:0; background:{{text_color}}; color:{{text_color}}; height:2px; width:57px;">
                  <h2 style="font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; margin:15px 0 0 0; font-size:16px; line-height:19px; color:{{text_color}}; font-weight:normal;">{{subheadline}}</h2>
                </td>
                <td width="20" style="width:20px;">&nbsp;</td>
              </tr>
              <tr><td colspan="3" height="20" style="height:20px;">&nbsp;</td></tr>
            </table>
          </td>
          <td width="20" style="width:20px;">&nbsp;</td>
        </tr>
        <tr><td colspan="3" height="35" style="height:35px;">&nbsp;</td></tr>
      </table>
    </td>
  </tr>
</table>
<!-- END: HB18-v4.2 Headline Card -->
