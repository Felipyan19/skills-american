<!-- START: ID=HB21-v4.2 Square Background -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
  <tr>
    <td align="center" bgcolor="{{bgColor}}" background="{{imageUrl}}" width="620" height="620" valign="top" style="background:url('{{imageUrl}}') center / cover no-repeat {{bgColor}};" class="full-width HB21-v40">
      <table role="none" cellpadding="0" cellspacing="0" border="0" width="620" style="width:620px;" class="full-width">
        <tr>
          <td width="100%" align="center" valign="top" style="padding:40px 40px;">
            <table role="none" cellpadding="0" cellspacing="0" border="0" width="540" style="width:540px;" class="full-width">
              <tr><td align="center" style="font-family:'BentonSans400', HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:51px; line-height:50px; color:{{textColor}};">{{headlineTop}}</td></tr>
              <tr><td align="center" style="padding-top:8px;"><span style="display:inline-block; background:{{accentColor}}; color:#FFFFFF; padding:7px 33px; font-family:'BentonSans500', HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:44px; line-height:47px;"><strong>{{headlineAccent}}</strong></span></td></tr>
              <tr><td align="center" style="font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:18px; line-height:23px; color:{{textColor}}; padding:24px 0 0;">{{description}}</td></tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<!-- END: HB21-v4.2 Square Background -->
