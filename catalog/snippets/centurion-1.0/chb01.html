<!-- START: Hero banner area CHB01 -->
<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="#000000">
  <tr><td><img src="{{imageUrl}}" alt="{{headline}}" width="620" style="display:block; width:100%; height:auto;" class="full-width"></td></tr>
  <tr>
    <td bgcolor="#000000" align="center" style="padding:40px 50px;">
      <p style="margin:0 0 16px; color:#C9A84C; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:12px; line-height:18px; letter-spacing:3px; text-transform:uppercase;">{{eyebrow}}</p>
      <h1 style="margin:0 0 20px; color:#FFFFFF; font-family:'Guardian Egyptian', Georgia, serif; font-size:38px; line-height:46px; font-weight:normal;">{{headline}}</h1>
      <p style="margin:0 0 32px; color:#CCCCCC; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif; font-size:16px; line-height:24px;">{{description}}</p>
      <a href="{{ctaUrl}}" target="_blank" style="border:1px solid #FFFFFF; color:#FFFFFF; display:inline-block; padding:14px 20px; text-decoration:none; border-radius:2px; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">{{ctaLabel}}</a>
    </td>
  </tr>
</table>
<!-- END: Hero banner CHB01 -->
