<table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" bgcolor="{{bgColor}}">
  <tr>
    <td align="center" style="padding:32px 40px; color:{{textColor}}; font-family:HelveticaNeue, Helvetica Neue Regular, Helvetica, Arial, sans-serif;">
      <h2 style="margin:0 0 14px; font-size:28px; line-height:34px; font-family:'Guardian Egyptian', Georgia, serif; font-weight:normal; color:{{textColor}};">{{headline}}</h2>
      <p style="margin:0; font-size:16px; line-height:24px;">{{description}}</p>
    </td>
  </tr>
</table>
