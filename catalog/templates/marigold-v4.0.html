<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>{{subject}}</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="AMX_GBS Templates 4.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <style>
      body { margin: 0; padding: 0; background: {{outerBg}}; font-family: Helvetica Neue, Helvetica, Arial, sans-serif; }
      table { border-collapse: collapse; }
      .container { width: 620px; }
      .full-width { width: 100%; }
      .full-width-block { width: 100%; display: block; }
      .mobile-on { display: none; }
    </style>
  </head>
  <body style="margin:0 auto !important;padding:0;background:{{outerBg}}" class="body">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin:0 auto !important;">
      <tr>
        <td>
          <div align="center">
            <div style="display:none;">
              <custom name="opencounter" type="tracking"/>
            </div>
            <div role="article" aria-roledescription="email" aria-label="Email from American Express" lang="en" dir="ltr">
              <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:{{outerBg}}">
                <tr>
                  <td align="center">
                    <table role="none" cellpadding="0" cellspacing="0" border="0" width="100%">
                      <tr>
                        <td align="center" bgcolor="{{outerBg}}">
                          <!-- START: EMAIL HEADER CONTAINER -->
                          <table role="none" cellpadding="0" cellspacing="0" border="0" width="620" style="width:620px;" class="container">
                            <tr>
                              <td>
                                {{header_html}}
                              </td>
                            </tr>
                          </table>
                          <!-- END: EMAIL HEADER CONTAINER -->
                        </td>
                      </tr>
                    </table>
                    <!-- START: EMAIL CONTENT CONTAINER -->
                    <table role="none" cellpadding="0" cellspacing="0" border="0" width="620" style="width:620px;background:#FFFFFF" class="container">
                      <tr>
                        <td>
                          {{body_html}}
                          {{footer_html}}
                        </td>
                      </tr>
                    </table>
                    <!-- END: EMAIL CONTENT CONTAINER -->
                  </td>
                </tr>
              </table>
            </div>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
